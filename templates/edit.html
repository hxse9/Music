{% extends 'base.html' %}

{% block content %}
<div class="write-container">
    <div class="write-card">
        <div style="margin-bottom: 24px;">
            <a href="{{ url_for('index') }}" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                뒤로가기
            </a>
        </div>
        
        <h2>추천 음악 수정하기 ✏️</h2>
        <p>작성하신 내용을 수정할 수 있습니다.</p>

        <form action="{{ url_for('edit_post', post_id=post.id) }}" method="POST" class="auth-form" style="margin-top: 30px;">
            <div class="form-group">
                <label for="title">곡명 (Title) <span class="required">*</span></label>
                <input type="text" id="title" name="title" required value="{{ post.title }}">
            </div>
            
            <div class="form-group">
                <label for="artist">아티스트 (Artist) <span class="required">*</span></label>
                <input type="text" id="artist" name="artist" required value="{{ post.artist }}">
            </div>
            
            <div class="form-group">
                <label for="genre_tag">음악 분위기/장르 (Tags)</label>
                <input type="text" id="genre_tag" name="genre_tag" value="{{ post.genre_tag }}">
            </div>

            <div class="form-group">
                <label for="youtube_url">유튜브 링크 (Youtube URL)</label>
                <input type="url" id="youtube_url" name="youtube_url" value="{{ post.youtube_url }}">
            </div>
            
            <div class="form-group">
                <label for="content">추천 이유 (Description) <span class="required">*</span></label>
                <textarea id="content" name="content" rows="6" required>{{ post.content }}</textarea>
            </div>
            
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                <a href="{{ url_for('index') }}" class="btn" style="background: transparent; color: var(--text-secondary);">취소</a>
                <button type="submit" class="btn btn-primary">수정 완료</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
