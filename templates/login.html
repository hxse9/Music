{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>로그인</h2>
        <p>환영합니다! K-Music Hub에 접속하세요.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" required placeholder="아이디 입력">
            </div>
            
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required placeholder="비밀번호 입력">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">로그인</button>
        </form>
        
        <div class="auth-footer">
            아직 연동된 계정이 없으신가요? <a href="{{ url_for('register') }}">개설하기</a>
        </div>
    </div>
</div>
{% endblock %}
