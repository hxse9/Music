{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>회원가입</h2>
        <p>K-Music Hub의 멤버가 되어 나만의 음악을 공유해보세요.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('register') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" required placeholder="영문, 숫자 조합">
            </div>
            
            <div class="form-group">
                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" name="nickname" required placeholder="활동할 닉네임 입력">
            </div>
            
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required placeholder="비밀번호 입력">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">가입하기</button>
        </form>
        
        <div class="auth-footer">
            이미 계정이 있으신가요? <a href="{{ url_for('login') }}">로그인</a>
        </div>
    </div>
</div>
{% endblock %}
